<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospedaje - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frontend\src\css\style.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-slate-800 mb-2">Bienvenido a <br> Hospedaje Digital</h1>
        <p class="text-center text-slate-500 mb-8">Ingresa con una cuenta existente</p>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700">Correo Electrónico</label>
                <input type="email" id="email" required
                    class="w-full mt-1 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Contraseña</label>
                <input type="password" id="password" required
                    class="w-full mt-1 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            
            <div id="errorMessage" class="hidden text-sm p-3 rounded-lg bg-red-50 text-red-600 border border-red-200"> </div>
            
            <button type="submit" 
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-600">
                ¿No tienes cuenta? <a href="./src/pages/register.html" class="text-blue-600 font-bold hover:underline">Registrarse</a>
            </p>
        </div>
    </div>

    <script src="./src/js/main.js"></script>
</body>
</html>
