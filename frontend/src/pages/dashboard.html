<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospedaje - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- Include Sidebar Component -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area with Flex Layout -->
    <div class="flex">
        <main class="flex-1 mt-10 p-6">
            <!-- Welcome Message Section -->
            <div id="welcomeSection" class="bg-white p-8 rounded-xl shadow-md border-l-4 border-l-blue-600 mb-8">
                <h2 id="welcomeTitle" class="text-3xl font-bold text-slate-800 mb-2">Bienvenido</h2>
                <p id="welcomeMessage" class="text-slate-600 text-lg mb-4">Cargando información...</p>
                <p id="currentDate" class="text-sm text-slate-500"></p>
            </div>
        </main>
    </div>

    <script src="/src/js/dashboard.js"></script>
</body>
</html>
