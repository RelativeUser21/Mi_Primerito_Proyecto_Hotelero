<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Hospedaje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="flex">
        <main class="flex-1 mt-10 p-6">
            <!-- Header Section -->
            <div class="mb-8">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-3xl font-bold text-slate-800">👥 Gestión de Usuarios</h1>
                        <p class="text-slate-600 mt-1">Crea, edita, elimina y gestiona usuarios del sistema</p>
                    </div>
                    <button id="crearUsuarioBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition shadow-md">
                        ➕ Crear Usuario
                    </button>
                </div>
            </div>

            <!-- Search and Filter Section -->
            <div class="bg-white p-4 rounded-lg shadow-sm mb-6">
                <div class="flex gap-4">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre o email..."
                        class="flex-1 p-3 border-2 border-slate-200 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition">
                    <button id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition">
                        Buscar
                    </button>
                    <button id="resetBtn" class="bg-slate-400 hover:bg-slate-500 text-white font-bold py-3 px-6 rounded-lg transition">
                        Limpiar
                    </button>
                </div>
            </div>

            <!-- Table Section -->
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <!-- Loading State -->
                <div id="loadingState" class="text-center py-12">
                    <div class="inline-block">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        <p class="mt-4 text-slate-600">Cargando usuarios...</p>
                    </div>
                </div>

                <!-- Table -->
                <table id="usuariosTable" class="w-full hidden">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="text-left p-4 font-semibold text-slate-700">Nombre</th>
                            <th class="text-left p-4 font-semibold text-slate-700">Email</th>
                            <th class="text-left p-4 font-semibold text-slate-700">Rol</th>
                            <th class="text-left p-4 font-semibold text-slate-700">Estado</th>
                            <th class="text-center p-4 font-semibold text-slate-700">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usuariosTableBody">
                    </tbody>
                </table>

                <!-- Empty State -->
                <div id="emptyState" class="text-center py-12 hidden">
                    <p class="text-slate-600 text-lg">📭 No hay usuarios para mostrar</p>
                </div>
            </div>

            <!-- Pagination Section -->
            <div id="paginationSection" class="mt-6 flex justify-between items-center hidden">
                <div class="text-slate-600">
                    <span id="paginationInfo">Mostrando 0 de 0 usuarios</span>
                </div>
                <div class="flex gap-2">
                    <button id="prevPage" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded transition disabled:opacity-50">
                        ← Anterior
                    </button>
                    <div id="pageNumbers" class="flex gap-1">
                    </div>
                    <button id="nextPage" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded transition disabled:opacity-50">
                        Siguiente →
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="/src/js/dashboard.js"></script>
    <script type="module" src="/src/js/usuarios.js"></script>
</body>
</html>
