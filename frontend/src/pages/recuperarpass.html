<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospedaje - Recuperar Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="flex justify-center mb-6">
            <div class="bg-blue-100 p-4 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-center text-slate-800 mb-2">¿Olvidaste tu contraseña?</h1>

        <!-- PASO 1: Solicitar Código -->
        <div id="step1" class="space-y-6">
            <p class="text-center text-slate-500 mb-8">Ingresa tu correo y te enviaremos un código de 6 dígitos para recuperar tu contraseña.</p>
            
            <form id="step1Form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Correo Electrónico</label>
                    <input type="email" id="email" required
                        class="w-full mt-1 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"
                        placeholder="micorreo@ejemplo.com">
                </div>

                <div id="step1Message" class="hidden text-sm p-3 rounded-lg"></div>

                <button type="submit" id="step1Btn"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                    Enviar código
                </button>
            </form>
        </div>

        <!-- PASO 2: Ingresar Código -->
        <div id="step2" class="hidden space-y-6">
            <p class="text-center text-slate-500 mb-8">Ingresa el código de 6 dígitos que enviamos a tu correo.</p>
            
            <form id="step2Form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Código de 6 dígitos</label>
                    <input type="text" id="code" maxlength="6" required placeholder="000000"
                        class="w-full mt-1 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition text-center text-2xl letter-spacing-lg font-mono">
                </div>

                <div id="step2Message" class="hidden text-sm p-3 rounded-lg"></div>

                <div class="flex gap-3">
                    <button type="button" id="step2Back"
                        class="flex-1 bg-gray-400 text-white py-3 rounded-lg font-semibold hover:bg-gray-500 transition">
                        Atrás
                    </button>
                    <button type="submit" id="step2Btn"
                        class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                        Verificar
                    </button>
                </div>
            </form>
        </div>

        <!-- PASO 3: Cambiar Contraseña -->
        <div id="step3" class="hidden space-y-6">
            <p class="text-center text-slate-500 mb-8">Ingresa tu nueva contraseña.</p>
            
            <form id="step3Form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Nueva Contraseña</label>
                    <input type="password" id="newPassword" required minlength="6"
                        class="w-full mt-1 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"
                        placeholder="Mínimo 6 caracteres">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" required minlength="6"
                        class="w-full mt-1 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"
                        placeholder="Confirma tu contraseña">
                </div>

                <div id="step3Message" class="hidden text-sm p-3 rounded-lg"></div>

                <div class="flex gap-3">
                    <button type="button" id="step3Back"
                        class="flex-1 bg-gray-400 text-white py-3 rounded-lg font-semibold hover:bg-gray-500 transition">
                        Atrás
                    </button>
                    <button type="submit" id="step3Btn"
                        class="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                        Cambiar Contraseña
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-8 text-center">
            <a href="../../index.html" id="backLink" class="text-sm text-blue-600 font-bold hover:underline flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Volver al inicio de sesión
            </a>
        </div>
    </div>

    <script src="/src/js/main.js"></script>
    <script src="/src/js/passwordRecovery.js"></script>
</body>
</html>
